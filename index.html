<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interactive Periodic Table (iykyk)</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <h1>Interactive Periodic Table (iykyk)</h1>
    <input id="search" placeholder="Search by name, symbol, or atomic number" />
    <div id="filters" role="toolbar" aria-label="Category filters"></div>
  </header>

  <main>
    <div id="table-wrapper">
      <section id="table" aria-label="Periodic table grid"></section>
    </div>
  </main>

  <div id="modal" role="dialog" aria-hidden="true">
    <div class="modal-content">
      <button id="close">×</button>
      <div id="details"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
